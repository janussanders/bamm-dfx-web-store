# BAMM contracts alignment (optional)

# Not required for dfx build/deploy (DDR-003/004).
# Validates contracts/*.snapshot.json against BAMM @bamm/contracts SSOT.
# Disabled on push/PR by default — pinned BAMM_CONTRACTS_REF often drifts and
# fails the orphan dfx repo. Re-enable via workflow_dispatch when refreshing snapshots.

name: BAMM contracts alignment

on:
  workflow_dispatch:
  # Uncomment when snapshots are intentionally refreshed against a live BAMM ref:
  # pull_request:
  #   paths:
  #     - 'contracts/canister-features.snapshot.json'
  #     - 'contracts/canister-bundles.snapshot.json'
  #     - '.github/workflows/bamm-contracts-alignment.yml'

env:
  # Prefer a tag/main that still contains packages/bamm-contracts
  BAMM_CONTRACTS_REF: main

jobs:
  validate-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dfx web store
        uses: actions/checkout@v4

      - name: Checkout BAMM contracts
        uses: actions/checkout@v4
        with:
          repository: janussanders/BAMM
          ref: ${{ env.BAMM_CONTRACTS_REF }}
          path: bamm-contracts-src
          sparse-checkout: |
            packages/bamm-contracts
          sparse-checkout-cone-mode: true

      - name: Validate snapshots against @bamm/contracts
        run: |
          node bamm-contracts-src/packages/bamm-contracts/scripts/validate-ecommerce-snapshot.mjs \
            "${{ github.workspace }}/contracts/canister-features.snapshot.json" \
            "${{ github.workspace }}/contracts/canister-bundles.snapshot.json"
