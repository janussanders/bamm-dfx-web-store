name: Deploy dfx (IC)

# Builds Motoko + frontend and optionally deploys to IC.
# Live agentic URL requires repo secrets (see DDR-004 / docs/dfx-deploy.md).
# Does not touch Caffeine production canisters.

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'dfx network'
        required: true
        default: 'ic'
        type: choice
        options:
          - ic
          - local
      deploy:
        description: 'Deploy after build (needs DFX_IDENTITY_PEM + cycles)'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: dfx-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS deps
        run: pnpm install --prefer-offline

      - name: Build Motoko backend (mops)
        run: |
          npx -y ic-mops@latest install
          npx -y ic-mops@latest build
          test -f src/backend/dist/backend.wasm
          test -f src/backend/dist/backend.did

      - name: Build frontend
        working-directory: src/frontend
        run: |
          pnpm build
          test -d dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dfx-build-${{ github.sha }}
          path: |
            src/backend/dist/backend.wasm
            src/backend/dist/backend.did
            src/frontend/dist/
            dfx.json

      - name: Install dfx
        if: ${{ inputs.deploy }}
        env:
          DFXVM_INIT_YES: 'true'
        run: |
          set -euo pipefail
          sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          # Linux CI path for dfxvm
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/share/dfx/bin:$PATH"
          # macOS-style path fallback
          if [ -f "$HOME/Library/Application Support/org.dfinity.dfx/env" ]; then
            # shellcheck disable=SC1091
            source "$HOME/Library/Application Support/org.dfinity.dfx/env"
          fi
          dfx --version

      - name: Import identity and deploy
        if: ${{ inputs.deploy }}
        env:
          DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}
          DFX_NETWORK: ${{ inputs.network }}
          DFX_TELEMETRY_DISABLED: '1'
          # CI uses imported PEM (plaintext on disk) — required for Actions
          DFX_WARNING: '-mainnet_plaintext_identity'
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/share/dfx/bin:$PATH"
          export DFX_WARNING=-mainnet_plaintext_identity
          if [ -z "${DFX_IDENTITY_PEM:-}" ]; then
            echo "::error::DFX_IDENTITY_PEM secret is required for deploy"
            exit 1
          fi
          mkdir -p "$HOME/.config/dfx/identity/ci"
          printf '%s\n' "$DFX_IDENTITY_PEM" > "$HOME/.config/dfx/identity/ci/identity.pem"
          chmod 600 "$HOME/.config/dfx/identity/ci/identity.pem"
          # Mark as plaintext so dfx accepts the imported PEM without keyring
          printf '%s\n' '{"hsm":null,"encryption":null,"keyring_identity_suffix":null}' \
            > "$HOME/.config/dfx/identity/ci/identity.json"
          dfx identity use ci
          dfx identity get-principal
          dfx cycles balance --network "$DFX_NETWORK" || true
          # Default create can request more than a fresh top-up; pin deposits to fit ~1.6 TC.
          # canister_ids.json pins IDs after first create — create is a no-op when already allocated.
          dfx canister create backend --network "$DFX_NETWORK" --identity ci --with-cycles 700000000000 || true
          dfx canister create frontend --network "$DFX_NETWORK" --identity ci --with-cycles 700000000000 || true
          BACKEND_ID=$(dfx canister id backend --network "$DFX_NETWORK")
          FRONTEND_ID=$(dfx canister id frontend --network "$DFX_NETWORK")
          # Inject live canister config before dfx rebuilds/uploads the assets canister.
          BACKEND_ID="$BACKEND_ID" FRONTEND_ID="$FRONTEND_ID" python3 - <<'PY'
          import json, os
          from pathlib import Path
          data = {
              "backend_host": "https://icp-api.io",
              "backend_canister_id": os.environ["BACKEND_ID"],
              "project_id": "bamm-dfx-web-store",
              "ii_derivation_origin": f"https://{os.environ['FRONTEND_ID']}.icp0.io",
              "storage_gateway_url": "undefined",
          }
          path = Path("src/frontend/env.json")
          path.write_text(json.dumps(data, indent=2) + "\n")
          print(path.read_text())
          PY
          dfx deploy --network "$DFX_NETWORK" --yes --identity ci
          {
            echo "## BAMM dfx Web Store deploy"
            echo "- **Network:** $DFX_NETWORK"
            echo "- **Backend:** \`$BACKEND_ID\`"
            echo "- **Frontend:** \`$FRONTEND_ID\`"
            echo "- **Agentic URL:** https://$FRONTEND_ID.icp0.io"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build-only summary
        if: ${{ !inputs.deploy }}
        run: |
          {
            echo "## BAMM dfx Web Store build"
            echo "- Motoko wasm + candid OK"
            echo "- Frontend dist OK"
            echo "- Deploy skipped (set deploy=true + DFX_IDENTITY_PEM for live URL)"
          } >> "$GITHUB_STEP_SUMMARY"
